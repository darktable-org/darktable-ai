MODEL_ID="upscale-bsrgan"
MODEL_NAME="upscale bsrgan"
MODEL_DESCRIPTION="BSRGAN 2x and 4x blind super-resolution"
MODEL_TASK="upscale"
MODEL_TILING=true
MODEL_TYPE="multi"
CHECKPOINT_URLS=(
    "https://github.com/cszn/KAIR/releases/download/v1.0/BSRGAN.pth"
    "https://github.com/cszn/KAIR/releases/download/v1.0/BSRGANx2.pth"
)
CHECKPOINT_PATHS=(
    "temp/upscale-bsrgan/BSRGAN.pth"
    "temp/upscale-bsrgan/BSRGANx2.pth"
)

run_convert() {
    python3 "$SCRIPT_DIR/convert.py" \
        --checkpoint "$ROOT_DIR/temp/$MODEL_ID/BSRGAN.pth" \
        --output "$ROOT_DIR/output/$MODEL_ID/model_x4.onnx" \
        --scale 4 \
        --opset 17

    python3 "$SCRIPT_DIR/convert.py" \
        --checkpoint "$ROOT_DIR/temp/$MODEL_ID/BSRGANx2.pth" \
        --output "$ROOT_DIR/output/$MODEL_ID/model_x2.onnx" \
        --scale 2 \
        --opset 17
}
